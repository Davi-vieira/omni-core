services:
  postgres:
    image: postgres:latest
    container_name: postgres_evolution
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: evolution
    networks:
      - evolution_net

  redis:
    image: redis:latest
    container_name: redis_evolution
    ports:
      - "6379:6379"
    networks:
      - evolution_net

  evolution_api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution_api
    ports:
      - "8081:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=429683C4C97741549DE5
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:password@postgres:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX=EVO
    depends_on:
      - postgres
      - redis
    networks:
      - evolution_net

networks:
  evolution_net:
    driver: bridge